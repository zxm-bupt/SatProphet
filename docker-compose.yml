version: "3.9"

services:
  db:
    image: docker.io/postgis/postgis:16-3.5
    container_name: satprophet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: satprophet
      POSTGRES_USER: satprophet
      POSTGRES_PASSWORD: satprophet
    ports:
      - "5432:5432"
    volumes:
      - satprophet_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satprophet -d satprophet"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  satprophet_pgdata:
